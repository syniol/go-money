run:
  timeout: 5m
  modules-download-mode: readonly

linters-settings:
  govet:
    disable-all: false
    enable-all: true

  gocyclo:
    min-complexity: 30  # Increased from 15 to accommodate complex parsing logic

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: GB

  lll:
    line-length: 140

  goimports:
    local-prefixes: github.com/syniol/go-money
