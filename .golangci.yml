run:
  timeout: 5m
  modules-download-mode: readonly

linters-settings:
  govet:
    check-shadowing: true
    disable-all: false
    enable-all: true
    disable:
      - fieldalignment  # Disable field alignment checks for generated code

  gocyclo:
    min-complexity: 30  # Increased from 15 to accommodate complex parsing logic

  dupl:
    threshold: 150  # Increased threshold to allow some reasonable duplication

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: GB

  lll:
    line-length: 140

  goimports:
    local-prefixes: github.com/syniol/go-money
