version: "1"

run:
  timeout: 5m
  modules-download-mode: readonly

output:
  formats:
    text:
      colors: true

linters:
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Disable field alignment checks for generated code
        - shadow

    gocyclo:
      min-complexity: 30  # Increased from 15 to accommodate complex parsing logic

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: UK

    lll:
      line-length: 140
